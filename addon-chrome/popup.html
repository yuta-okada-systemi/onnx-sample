<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub Issue Search</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fa;
        --panel: #ffffff;
        --panel-soft: #f0f3f6;
        --border: #d8dee4;
        --text: #24292f;
        --muted: #57606a;
        --accent: #0969da;
        --accent-strong: #0550ae;
        --danger: #cf222e;
        --success: #1a7f37;
        --shadow: 0 8px 28px rgba(27, 31, 36, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        padding: 16px;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        display: grid;
        gap: 14px;
        max-width: 560px;
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: grid;
        gap: 2px;
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      .brand p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 2px 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .section {
        display: grid;
        gap: 12px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 14px;
        line-height: 1.3;
      }

      .form-grid {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      input {
        width: 100%;
        min-height: 38px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #ffffff;
        color: var(--text);
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.14);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 8px 12px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .secondary {
        border-color: var(--border);
        background: var(--panel);
        color: var(--text);
      }

      .secondary:hover {
        background: var(--panel-soft);
      }

      .status {
        min-height: 18px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .status.error {
        color: var(--danger);
      }

      .status.success {
        color: var(--success);
      }

      .progress {
        overflow: hidden;
        height: 7px;
        border-radius: 999px;
        background: var(--panel-soft);
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0969da, #2da44e);
        transition: width 160ms ease;
      }

      .search-box {
        position: sticky;
        top: 0;
        z-index: 2;
        display: grid;
        gap: 10px;
        padding: 0 0 2px;
        background: var(--panel);
      }

      .results {
        display: grid;
        gap: 10px;
      }

      .empty {
        padding: 18px 10px;
        border: 1px dashed var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      .issue {
        display: grid;
        gap: 8px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
      }

      .issue-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .issue-title {
        color: var(--text);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.35;
        text-decoration: none;
      }

      .issue-title:hover {
        color: var(--accent);
        text-decoration: underline;
      }

      .score {
        flex: 0 0 auto;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 12px;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .labels {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .label {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        min-height: 20px;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
      }

      @media (max-width: 380px) {
        body {
          padding: 12px;
        }

        .actions,
        .topbar,
        .section-title {
          align-items: stretch;
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <h1>Issue Semantic Search</h1>
          <p>GitHub Issues indexed locally with embeddings</p>
        </div>
        <span id="dbCount" class="pill">0 saved</span>
      </header>

      <section class="section" aria-labelledby="syncTitle">
        <div class="section-title">
          <h2 id="syncTitle">Sync repository</h2>
          <span id="modelStatus" class="pill">Model idle</span>
        </div>

        <div class="form-grid">
          <label>
            Repository URL or owner/repo
            <input
              id="repoInput"
              autocomplete="off"
              placeholder="https://github.com/owner/repo"
            />
          </label>

          <label>
            GitHub personal access token
            <input
              id="tokenInput"
              autocomplete="off"
              placeholder="ghp_..."
              type="password"
            />
          </label>
        </div>

        <div class="actions">
          <button id="syncButton" type="button">Sync</button>
          <button id="clearButton" class="secondary" type="button">Clear local data</button>
          <button id="exportButton" class="secondary" type="button">Export</button>
        </div>

        <div class="progress" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="syncStatus" class="status">Ready.</div>
      </section>

      <section class="section" aria-labelledby="searchTitle">
        <div class="search-box">
          <div class="section-title">
            <h2 id="searchTitle">Search</h2>
            <span id="resultCount" class="pill">0 results</span>
          </div>

          <input
            id="searchInput"
            autocomplete="off"
            placeholder="例: login error after token refresh"
          />
          <div id="searchStatus" class="status">Type to search saved issues.</div>
        </div>

        <div id="results" class="results">
          <div class="empty">No results yet.</div>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
